services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_ENABLE_DEV_TOOLS: ${NEXT_PUBLIC_ENABLE_DEV_TOOLS:-false}
    container_name: fu_cs_consultant_frontend
    restart: unless-stopped
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      PORT: ${FRONTEND_PORT:-3000}
    depends_on:
      backend:
        condition: service_started

  backend:
    build: ./backend
    container_name: fu_cs_consultant_backend
    restart: unless-stopped
    command: ["python", "-m", "app.main"]
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:${CONSULTANT_PORT:-8000}:${CONSULTANT_PORT:-8000}"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      CONSULTANT_HOST: ${CONSULTANT_HOST:-0.0.0.0}
      CONSULTANT_PORT: ${CONSULTANT_PORT:-8000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
    volumes:
      - ./ressources:/app/ressources:ro
      - ./backend/traces:/app/traces

  caddy:
    profiles: ["production"]
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    container_name: fu_cs_consultant_caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      CONSULTANT_PORT: ${CONSULTANT_PORT:-8000}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  qdrant:
    profiles: ["legacy-rag"]
    image: qdrant/qdrant:latest
    container_name: fu_cs_consultant_qdrant
    restart: unless-stopped
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:${QDRANT_HTTP_PORT:-6335}:6333"
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:${QDRANT_GRPC_PORT:-6336}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  legacy-rag-ingest:
    profiles: ["legacy-rag"]
    build:
      context: ./backend
      target: legacy-rag
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
    volumes:
      - ./ressources:/app/ressources:ro
    depends_on:
      qdrant:
        condition: service_started
    command: ["python", "scripts/ingest_resources.py"]

volumes:
  qdrant_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
