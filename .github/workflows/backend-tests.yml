name: Backend tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch makes an in-flight run obsolete.
concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Compile check
        run: uv run --isolated --python 3.12.10 python -m compileall -q app scripts

      - name: Run tests
        run: >-
          uv run --isolated --python 3.12.10
          --with-requirements requirements.txt --with pytest
          python -m pytest -q
